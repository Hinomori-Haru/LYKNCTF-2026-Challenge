<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Members Area — Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="card">
    <h1>🔐 Members Area</h1>
    <p class="muted">Log in to enter the members area.</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="{{ url_for('login') }}">
      <label>Username</label>
      <input name="username" placeholder="username" autofocus autocomplete="off">
      <label>Password</label>
      <input name="password" type="password" placeholder="password">
      <button type="submit">Log in</button>
    </form>
    <p class="hint">Demo account: <code>guest</code> / <code>guest</code></p>
  </div>
</body>
</html>
