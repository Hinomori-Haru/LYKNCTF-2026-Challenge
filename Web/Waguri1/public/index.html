<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spawn Race</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0d0d0f;
        color: #f5f5f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 30% 15%, rgba(235, 70, 100, 0.18), transparent 30%),
          linear-gradient(145deg, #0d0d0f 0%, #181719 52%, #101314 100%);
      }

      main {
        position: relative;
        width: 100vw;
        min-height: 100vh;
        padding: 18px;
        display: grid;
        place-items: center;
      }

      .spawn-button {
        position: relative;
        z-index: 10;
        width: min(74vw, 280px);
        min-height: 76px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 8px;
        background: #f5f5f5;
        color: #101010;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.38);
        cursor: pointer;
        font-size: 1.6rem;
        font-weight: 900;
        letter-spacing: 0;
        transition: transform 160ms ease, background 160ms ease, opacity 160ms ease;
      }

      .spawn-button:hover:not(:disabled),
      .spawn-button:focus-visible:not(:disabled) {
        background: #ffdf5d;
        transform: translateY(-2px);
      }

      .spawn-button:disabled {
        cursor: not-allowed;
        opacity: 0.56;
      }

      .stage {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .stage[hidden] {
        display: none;
      }

      .spawned-image {
        position: absolute;
        width: clamp(96px, 20vw, 220px);
        height: auto;
        border-radius: 8px;
        object-fit: contain;
        image-rendering: auto;
        filter: drop-shadow(0 18px 28px rgba(0, 0, 0, 0.42));
      }

      @media (max-width: 520px) {
        main {
          min-height: 300px;
          padding: 18px;
        }

        .spawn-button {
          min-height: 68px;
          font-size: 1.35rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <button id="spawnButton" class="spawn-button" type="button" aria-label="Spawn">SPAWN</button>
      <section id="stage" class="stage" aria-live="polite" hidden></section>
    </main>

    <script>
      const spawnButton = document.querySelector('#spawnButton');
      const stage = document.querySelector('#stage');
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const socket = new WebSocket(`${protocol}//${window.location.host}`);

      function setReady(value) {
        spawnButton.disabled = !value;
      }

      function randomBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function showSpawn(imagePath, soundPath) {
        stage.hidden = false;

        const image = new Image();
        image.className = 'spawned-image';
        image.src = imagePath;
        image.alt = '';
        image.decoding = 'async';
        image.style.left = `${randomBetween(6, 94)}vw`;
        image.style.top = `${randomBetween(6, 94)}vh`;
        image.style.transform = `translate(-50%, -50%) rotate(${randomBetween(-10, 10)}deg)`;
        stage.append(image);

        const audio = new Audio(soundPath);
        audio.currentTime = 0;
        audio.play().catch(() => {});
      }

      socket.addEventListener('open', () => {
        setReady(true);
      });

      socket.addEventListener('close', () => {
        setReady(false);
      });

      socket.addEventListener('message', (event) => {
        let message;

        try {
          message = JSON.parse(event.data);
        } catch {
          return;
        }

        if (message.type === 'spawned' && message.image && message.sound) {
          showSpawn(message.image, message.sound);
        }
      });

      spawnButton.addEventListener('click', () => {
        if (socket.readyState !== WebSocket.OPEN) {
          return;
        }

        socket.send(JSON.stringify({ type: 'spawn' }));
      });

      setReady(false);
    </script>
  </body>
</html>
